apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: devops-app

  template:
    metadata:
      labels:
        app: devops-app

    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          ports:
            - containerPort: 8080

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          env:
            - name: SWAGGER_ENABLED
              value: "{{ .Values.swagger.enabled | quote }}"
            - name: SWAGGER_PATH
              value: "{{ .Values.swagger.path }}"

          # STARTUP PROBE
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 20

          # LIVENESS PROBE
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10

          # READINESS PROBE
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 10
